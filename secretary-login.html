<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Secretary AI — Accedi</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{--bg:#080810;--card:#14142a;--line:#262640;--txt:#eef0ff;--muted:#8f8fae;--v1:#7c5cff;--v2:#22d3ee;--grad:linear-gradient(120deg,#7c5cff,#22d3ee);--good:#3ee6a0}
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Space Grotesk',sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;display:grid;place-items:center;overflow:hidden;position:relative;padding:20px}
  body::before{content:"";position:absolute;top:-15%;left:50%;transform:translateX(-50%);width:800px;height:600px;background:radial-gradient(circle,rgba(124,92,255,.35),transparent 60%);filter:blur(20px)}
  .box{position:relative;z-index:2;width:100%;max-width:400px;background:var(--card);border:1px solid var(--line);border-radius:24px;padding:38px 32px;box-shadow:0 40px 100px rgba(0,0,0,.6)}
  .brand{font-family:'Unbounded';font-weight:800;font-size:20px;display:flex;align-items:center;gap:10px;justify-content:center;margin-bottom:6px}
  .brand .m{width:34px;height:34px;border-radius:10px;background:var(--grad);display:grid;place-items:center;font-size:17px}
  .brand b{color:var(--v1)}
  .welcome{text-align:center;color:var(--muted);font-size:14px;margin-bottom:26px}
  .tabs{display:flex;background:var(--bg);border:1px solid var(--line);border-radius:12px;padding:4px;margin-bottom:22px}
  .tabs button{flex:1;background:none;border:none;color:var(--muted);font-family:inherit;font-weight:600;font-size:14px;padding:10px;border-radius:9px;cursor:pointer;transition:.2s}
  .tabs button.on{background:var(--card);color:var(--txt);box-shadow:0 2px 10px rgba(0,0,0,.3)}
  label{display:block;font-size:13px;font-weight:600;color:var(--muted);margin:14px 0 6px}
  input{width:100%;background:var(--bg);border:1px solid var(--line);border-radius:11px;padding:13px 14px;color:var(--txt);font-family:inherit;font-size:15px}
  input:focus{outline:none;border-color:var(--v1)}
  .btn{width:100%;background:var(--grad);color:#fff;border:none;border-radius:11px;padding:14px;font-family:inherit;font-weight:700;font-size:15px;cursor:pointer;margin-top:22px;transition:.2s}
  .btn:hover{transform:translateY(-2px);box-shadow:0 12px 30px rgba(124,92,255,.4)}
  .btn:disabled{opacity:.6;cursor:wait;transform:none;box-shadow:none}
  .msg{font-size:13px;margin-top:14px;text-align:center;min-height:18px}
  .msg.err{color:#ff8a7a}.msg.ok{color:var(--good)}
  .foot{text-align:center;color:var(--muted);font-size:12px;margin-top:20px}
  .foot a{color:var(--v2);cursor:pointer}
  .success{text-align:center;padding:10px 0}
  .success .em{font-size:48px}
  .spin{display:inline-block;width:15px;height:15px;border:2px solid rgba(255,255,255,.5);border-top-color:#fff;border-radius:50%;animation:s .7s linear infinite;vertical-align:-2px;margin-right:8px}
  @keyframes s{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="box" id="box">
  <div class="brand"><span class="m">🤖</span> SECRETARY<b>.</b>AI</div>
  <div class="welcome">La tua segretaria digitale, sempre attiva.</div>

  <div id="form">
    <div class="tabs">
      <button id="tab-login" class="on" onclick="setTab('login')">Accedi</button>
      <button id="tab-signup" onclick="setTab('signup')">Crea account</button>
    </div>
    <div id="nameWrap" style="display:none">
      <label>Nome attività</label>
      <input id="nome" placeholder="Es. Lo'Steria">
    </div>
    <label>Email</label>
    <input id="email" type="email" placeholder="nome@esempio.it">
    <label>Password</label>
    <input id="pw" type="password" placeholder="Almeno 8 caratteri">
    <button class="btn" id="go" onclick="submit()">Accedi</button>
    <div class="msg" id="msg"></div>
    <div class="foot" id="foot"></div>
  </div>

  <div id="done" style="display:none" class="success">
    <div class="em">✅</div>
    <h3 style="font-family:'Unbounded';margin:12px 0 6px" id="doneTitle">Benvenuto!</h3>
    <p style="color:var(--muted);font-size:14px" id="doneText"></p>
    <button class="btn" onclick="location.href='secretary-app-pro.html'">Entra nella dashboard →</button>
  </div>
</div>

<script>
  const SUPA_URL="https://igxpiyiesgurxtuxmqdg.supabase.co";
  const SUPA_KEY="sb_publishable_VHkucSpdr_Tv9k6gxLF1Vg_wyzyJBV9";
  const $=id=>document.getElementById(id);
  let mode='login';

  function setTab(m){
    mode=m;
    $('tab-login').classList.toggle('on',m==='login');
    $('tab-signup').classList.toggle('on',m==='signup');
    $('nameWrap').style.display=m==='signup'?'block':'none';
    $('go').textContent=m==='signup'?'Crea account':'Accedi';
    $('msg').textContent='';
  }

  async function submit(){
    const email=$('email').value.trim(), pw=$('pw').value;
    const msg=$('msg'); msg.className='msg';
    if(!/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(email)){msg.className='msg err';msg.textContent='Email non valida.';return;}
    if(pw.length<8){msg.className='msg err';msg.textContent='La password deve avere almeno 8 caratteri.';return;}
    const btn=$('go'); btn.disabled=true; btn.innerHTML='<span class="spin"></span>'+(mode==='signup'?'Creo l\'account…':'Accedo…');
    try{
      if(mode==='signup'){
        const r=await fetch(SUPA_URL+'/auth/v1/signup',{method:'POST',headers:{'apikey':SUPA_KEY,'Content-Type':'application/json'},body:JSON.stringify({email,password:pw,data:{nome_attivita:$('nome').value.trim()}})});
        const j=await r.json();
        if(r.ok){if(j.access_token){try{localStorage.setItem('sb_token',j.access_token);}catch(e){}}showDone('Account creato!',j.access_token?'Il tuo account è pronto — entra pure nella dashboard.':'Account creato. Se richiesto, conferma l\'email, poi accedi.');}
        else{msg.className='msg err';msg.textContent=j.msg||j.error_description||j.error||'Registrazione non riuscita.';}
      }else{
        const r=await fetch(SUPA_URL+'/auth/v1/token?grant_type=password',{method:'POST',headers:{'apikey':SUPA_KEY,'Content-Type':'application/json'},body:JSON.stringify({email,password:pw})});
        const j=await r.json();
        if(r.ok && j.access_token){try{localStorage.setItem('sb_token',j.access_token);}catch(e){}showDone('Benvenuto!','Accesso effettuato. Da qui vedresti la dashboard con i TUOI dati.');}
        else{msg.className='msg err';msg.textContent=j.error_description||j.msg||'Email o password errati.';}
      }
    }catch(e){msg.className='msg err';msg.textContent='Errore di connessione, riprova.';}
    btn.disabled=false; btn.textContent=mode==='signup'?'Crea account':'Accedi';
  }
  function showDone(t,x){$('form').style.display='none';$('done').style.display='block';$('doneTitle').textContent=t;$('doneText').textContent=x;}
</script>
</body>
</html>
